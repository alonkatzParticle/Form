name: Update Frequency Order

on:
  schedule:
    - cron: '0 9 * * 6'   # Every Saturday at 9am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: cd server && npm install

      - name: Generate frequency order
        run: NODE_PATH=./server/node_modules node --input-type=module < scripts/generateFrequencyOrder.js
        env:
          MONDAY_API_KEY: ${{ secrets.MONDAY_API_KEY }}

      - name: Commit updated frequency order
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update frequency order [automated]"
          file_pattern: server/data/frequencyOrder.json
